# ContextOS — local service stack for team-mode + integration tests.
#
# Used by:
#   - `pnpm test:integration` via testcontainers (from Module 02 onward)
#   - Developers who opt into running Postgres/Redis locally instead of the
#     default solo-mode SQLite store
#
# Module 01 Foundation ships this file but does NOT require it to run.
# Starting it requires Docker Desktop (see docs/DEVELOPMENT.md).

name: contextos

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contextos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contextos
      POSTGRES_PASSWORD: contextos_dev_password
      POSTGRES_DB: contextos
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - contextos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextos -d contextos"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=vector"
      - "-c"
      - "max_connections=100"

  redis:
    image: redis:7-alpine
    container_name: contextos-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - contextos_redis_data:/data
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--save"
      - "60"
      - "1000"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  contextos_pg_data:
    name: contextos_pg_data
  contextos_redis_data:
    name: contextos_redis_data
